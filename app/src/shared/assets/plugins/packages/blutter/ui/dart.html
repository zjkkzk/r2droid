<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blutter Dart</title>
  <style>
    :root{color-scheme:dark light;--bg:#101418;--card:#182028;--text:#eef3f8;--muted:#9fb0c0;--accent:#7cc7ff;--border:#2c3a46}
    body{margin:0;padding:16px;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
    h1{font-size:22px;margin:0 0 8px}.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin:12px 0}p,li{color:var(--muted);line-height:1.5}code{color:var(--accent)}
  </style>
</head>
<body>
  <h1>Dart</h1>
  <div class="card">
    <p>这里用于承载 Dart 元数据、字符串、类型和源码线索。运行 Blutter 后可以从输出目录中的 Dart/metadata 相关文件继续分析。</p>
    <p>当前页是插件多子 tab 的占位页面，后续可扩展为解析 Blutter 输出并提供过滤、复制与跳转。</p>
  </div>
</body>
</html>
